{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Add Theater</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <input
        name="name"
        class="form-control mb-3"
        placeholder="Theater Name"
        required
    >

    <input
        name="city"
        class="form-control mb-3"
        placeholder="City"
        required
    >

    <textarea
        name="address"
        class="form-control mb-3"
        placeholder="Address"
    ></textarea>

    <input
        type="number"
        name="total_screens"
        class="form-control mb-3"
        placeholder="Total Screens"
    >

    <input
        name="amenities"
        class="form-control mb-3"
        placeholder="Amenities, comma separated"
    >

    <input
        name="parking_info"
        class="form-control mb-3"
        placeholder="Parking information"
    >

    <input
        name="map_url"
        class="form-control mb-3"
        placeholder="Google Maps URL"
    >

    <label class="form-check mb-3">
        <input type="checkbox" class="form-check-input" name="food_available" checked>
        <span class="form-check-label">Food available</span>
    </label>

    <button
        class="btn btn-success"
        type="submit"
    >
        Add Theater
    </button>

</form>

</div>

{% endblock %}
