{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg">

            <div class="card-header bg-dark text-white text-center">
                <h3>🎬 Add New Movie</h3>
            </div>

            <div class="card-body">

                <form
                    method="POST"
                    action="/add-movie"
                    enctype="multipart/form-data"
                >

                    <input
                        type="text"
                        name="title"
                        class="form-control mb-3"
                        placeholder="Movie Title"
                        required
                    >

                    <textarea
                        name="description"
                        class="form-control mb-3"
                        placeholder="Movie Description"
                        rows="4"
                        required
                    ></textarea>

                    <label class="form-label">
                        Upload Poster
                    </label>

                    <input
                        type="file"
                        name="poster"
                        class="form-control mb-3"
                        accept="image/*"
                        required
                    >

                    <input
                        type="text"
                        name="language"
                        class="form-control mb-3"
                        placeholder="Language"
                        required
                    >

                    <label class="form-label">Genre</label>
                    <select name="genre" class="form-control mb-3" required>
                        <option value="">Select Genre</option>
                        {% for g in ["Action","Comedy","Drama","Romance","Thriller","Horror","Animation","Sci-Fi"] %}
                            <option value="{{ g }}">{{ g }}</option>
                        {% endfor %}
                    </select>

                    <input
                        type="text"
                        name="release_date"
                        class="form-control mb-3"
                        placeholder="Release Date (2026)"
                        required
                    >

                    <input
                        type="number"
                        step="0.1"
                        min="0"
                        max="10"
                        name="rating"
                        class="form-control mb-3"
                        placeholder="Rating (0-10)"
                        required
                    >

                    <label class="form-label">YouTube Trailer URL</label>
                    <input
                        type="url"
                        name="trailer_url"
                        class="form-control mb-3"
                        placeholder="https://www.youtube.com/watch?v=xxxx">

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >
                        🎬 Add Movie
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
