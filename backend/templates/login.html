{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg cx-login-card">

            <div class="card-header text-center">
                <h2>Login - CineVerse X</h2>
                <p class="mb-0">Use Google or your CineVerse account.</p>
            </div>

            <div class="card-body">
                <a href="{{ url_for('google_auth_bp.google_login') }}" class="btn btn-light btn-lg w-100 cx-google-login">
                    <i class="fa-brands fa-google"></i> Continue with Google
                </a>

                <div class="cx-login-divider"><span>or</span></div>

                <form method="POST" action="{{ url_for('auth_bp.login') }}" class="cx-login-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <label>
                        <span>Email</span>
                        <input class="form-control" type="email" name="email" autocomplete="email" required>
                    </label>

                    <label>
                        <span>Password</span>
                        <input class="form-control" type="password" name="password" autocomplete="current-password" required>
                    </label>

                    <button class="btn btn-dark btn-lg w-100" type="submit">
                        Login
                    </button>
                </form>

                <div class="d-flex justify-content-between flex-wrap gap-2 mt-3">
                    <a href="{{ url_for('auth_bp.reset_password') }}">Reset password</a>
                    <a href="{{ url_for('auth_bp.register') }}">Create account</a>
                </div>

                {% if system_settings and system_settings.support_discord_link %}
                <div class="mt-3 text-center">
                    <a
                        href="{{ system_settings.support_discord_link }}"
                        target="_blank"
                        rel="noopener noreferrer">
                        <i class="fa-brands fa-discord"></i>
                        Need help? Join Discord
                    </a>
                </div>
                {% endif %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
