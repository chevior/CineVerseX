{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg">

            <div class="card-header bg-dark text-white text-center">
                <h2>Login - CineVerse X</h2>
            </div>

            <div class="card-body text-center">
                <p class="text-muted mb-4">
                    Continue with your Google account to access CineVerse X.
                </p>

                <a href="{{ url_for('google_auth_bp.google_login') }}" class="btn btn-danger btn-lg w-100">
                    <i class="fa-brands fa-google"></i> Continue with Google
                </a>

                {% if system_settings and system_settings.support_discord_link %}
                <div class="mt-3">
                    <a
                        href="{{ system_settings.support_discord_link }}"
                        target="_blank"
                        rel="noopener noreferrer">
                        <i class="fa-brands fa-discord"></i>
                        Need help? Join Discord
                    </a>
                </div>
                {% endif %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
