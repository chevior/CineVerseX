{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Movie</h2>

    <form method="POST">

        <input
            type="text"
            name="title"
            value="{{ movie.title }}"
            class="form-control mb-3"
        >

        <textarea
            name="description"
            class="form-control mb-3"
        >{{ movie.description }}</textarea>

        <input
            type="text"
            name="language"
            value="{{ movie.language }}"
            class="form-control mb-3"
        >

        <input
            type="text"
            name="genre"
            value="{{ movie.genre }}"
            class="form-control mb-3"
        >

        <input
            type="text"
            name="release_date"
            value="{{ movie.release_date }}"
            class="form-control mb-3"
        >

        <input
            type="number"
            step="0.1"
            name="rating"
            value="{{ movie.rating }}"
            class="form-control mb-3"
        >

        <button class="btn btn-success">
            Update Movie
        </button>

    </form>

</div>

{% endblock %}
