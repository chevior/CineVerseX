{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Movie</h2>

    <form method="POST">

        <input
            type="text"
            name="title"
            value="{{ movie.title }}"
            class="form-control mb-3"
        >

        <textarea
            name="description"
            class="form-control mb-3"
        >{{ movie.description }}</textarea>

        <input
            type="text"
            name="language"
            value="{{ movie.language }}"
            class="form-control mb-3"
        >

        <label class="form-label">Genre</label>
        <select name="genre" class="form-control mb-3" required>
            {% for g in genres %}
                <option value="{{ g }}" {% if movie.genre == g %}selected{% endif %}>
                    {{ g }}
                </option>
            {% endfor %}
        </select>

        <input
            type="text"
            name="release_date"
            value="{{ movie.release_date }}"
            class="form-control mb-3"
        >

        <input
            type="number"
            step="0.1"
            name="rating"
            value="{{ movie.rating }}"
            class="form-control mb-3"
        >

        <label class="form-label">YouTube Trailer URL</label>
        <input
            type="url"
            name="trailer_url"
            value="{{ trailer_watch_url or movie.trailer_url or '' }}"
            class="form-control mb-3"
            placeholder="https://www.youtube.com/watch?v=xxxx">

        <label class="form-label">JustWatch URL</label>
        <input
            type="url"
            name="justwatch_url"
            value="{{ movie.justwatch_url or '' }}"
            class="form-control mb-3"
            placeholder="https://www.justwatch.com/in/movie/example">

        <label class="form-label">BookMyShow URL</label>
        <input
            type="url"
            name="bookmyshow_url"
            value="{{ movie.bookmyshow_url or '' }}"
            class="form-control mb-3"
            placeholder="https://in.bookmyshow.com/movies/example/">

        <button class="btn btn-success">
            Update Movie
        </button>

    </form>

</div>

{% endblock %}
