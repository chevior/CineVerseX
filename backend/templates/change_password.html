{% extends "base.html" %}

{% block content %}

<section class="account-shell">
    <div class="account-panel">
        <div class="account-summary">
            <span class="account-kicker">Account Security</span>
            <h1>Change Password</h1>
            <p>
                Update your password from your account page. Your new password
                starts working immediately after saving.
            </p>
        </div>

        <form method="POST" action="/change-password" class="account-form">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <input
                    type="password"
                    name="current_password"
                    class="form-control form-control-lg"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input
                    type="password"
                    name="new_password"
                    class="form-control form-control-lg"
                    minlength="6"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <input
                    type="password"
                    name="confirm_password"
                    class="form-control form-control-lg"
                    minlength="6"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-warning btn-lg w-100">
                Update Password
            </button>
        </form>
    </div>
</section>

{% endblock %}
